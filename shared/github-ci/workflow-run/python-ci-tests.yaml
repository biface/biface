# ==============================================================================
# python-ci-tests.yaml — Reference configuration (workflow_run model, step 2/3)
# ==============================================================================
#
# Triggered by the completion of python-ci-quality.yaml via `workflow_run`.
#
# Adapt the following values to your project:
#   - `workflows: ["Python CI - Quality"]` must match the `name:` field of
#     python-ci-quality.yaml exactly — this string is the only link between
#     the two files, GitHub does not check it at edit time
#   - Adjust the Python version matrix to your project's supported versions
#   - The `ref: ${{ github.event.workflow_run.head_sha }}` checkout is
#     mandatory in every file triggered by workflow_run — without it GitHub
#     checks out the branch's latest commit, not the one that triggered the
#     chain
#   - The `if: github.event.workflow_run.conclusion == 'success'` guard is
#     mandatory in every file triggered by workflow_run — without it the job
#     runs even after a failed predecessor
#   - Next in the chain: python-ci-coverage.yaml (see ../coverage/), which
#     must list `workflows: ["Python CI - Tests"]` to match the `name:` below
#
# ==============================================================================

name: Python CI - Tests

on:
  workflow_run:
    workflows: ["Python CI - Quality"]
    types:
      - completed
    branches:
      - '**'

jobs:
  tests:
    name: Run Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    # Only runs if Quality workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: '3.10'
          - python-version: '3.11'
          - python-version: '3.12'
          - python-version: '3.13'
          - python-version: '3.14'
            continue-on-error: true

    continue-on-error: ${{ matrix.continue-on-error == true }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install tox
        run: uv pip install --system tox tox-uv

      - name: Run tests with tox
        run: |
          PYVER=$(echo "${{ matrix.python-version }}" | tr -d '.')
          tox -e py${PYVER}
